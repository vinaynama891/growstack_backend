version: '3.8'

services:
  # Database Service (MongoDB)
  db:
    image: mongo:latest
    container_name: growstack_db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - growstack_network

  # Application Server Service (Express + React Frontend)
  server:
    build:
      context: ../
      dockerfile: server/Dockerfile
    container_name: growstack_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://db:27017/growstack
      - JWT_SECRET=growstack_prod_secret_key_2026_change_me
      - ALLOWED_ORIGINS=*
      - ADMIN_EMAIL=admin@growstack.com
      - ADMIN_PASSWORD=admin@20
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX=100
    networks:
      - growstack_network

networks:
  growstack_network:
    driver: bridge

volumes:
  mongo_data:
    driver: local
